.track.dragging { cursor: grabbing; }

<script>
(() => {
  "use strict";

  const track = document.getElementById('track');
  const BASE_VELOCITY = -0.55;   // px / frame at 60fps — gentle leftward drift
  const RETURN_RATE   = 0.04;    // how quickly extra speed dampens back to baseline
  const MAX_VELOCITY  = -22;     // most negative (fastest left) we allow
  const MIN_VELOCITY  =  18;     // most positive (fastest right) we allow

  let scrollX = 0;
  let velocity = BASE_VELOCITY;
  let halfWidth = 0;             // width of one full set; track holds two sets

  function measure() {
    // The track contains two identical passes. Half the scrollWidth equals
    // exactly one pass — that's the wrap distance for a seamless loop.
    halfWidth = track.scrollWidth / 2;
  }

  function frame() {
    scrollX += velocity;
    if (scrollX <= -halfWidth) scrollX += halfWidth;
    if (scrollX >= 0)          scrollX -= halfWidth;
    track.style.transform = 'translateX(' + scrollX + 'px)';

    // Ease back toward baseline. RETURN_RATE per frame; small enough that
    // a wheel boost is visible for a moment before settling.
    velocity += (BASE_VELOCITY - velocity) * RETURN_RATE;

    requestAnimationFrame(frame);
  }

  // Scrolling wheel adds to the leftward velocity.
  window.addEventListener('wheel', (e) => {
    // Capture both axes — trackpads emit deltaX for horizontal swipes too.
    const d = (Math.abs(e.deltaX) > Math.abs(e.deltaY)) ? e.deltaX : e.deltaY;
    velocity -= d * 0.04;
    if (velocity < MAX_VELOCITY) velocity = MAX_VELOCITY;
    if (velocity > MIN_VELOCITY) velocity = MIN_VELOCITY;
    e.preventDefault();
  }, { passive: false });

  // Click-drag (desktop) and touch-drag (mobile).
  let dragging = false;
  let lastPointerX = 0;
  let dragVelocityHistory = [];

  function pointerDown(x) {
    dragging = true;
    lastPointerX = x;
    track.classList.add('dragging');
    dragVelocityHistory = [];
  }
  function pointerMove(x) {
    if (!dragging) return;
    const dx = x - lastPointerX;
    lastPointerX = x;
    scrollX += dx;
    if (scrollX <= -halfWidth) scrollX += halfWidth;
    if (scrollX >= 0)          scrollX -= halfWidth;
    track.style.transform = 'translateX(' + scrollX + 'px)';
    // Track recent dx values to derive a release velocity (flick gesture).
    dragVelocityHistory.push(dx);
    if (dragVelocityHistory.length > 6) dragVelocityHistory.shift();
  }
  function pointerUp() {
    if (!dragging) return;
    dragging = false;
    track.classList.remove('dragging');
    // Average recent dx → release velocity, then let dampening pull it
    // back toward baseline.
    if (dragVelocityHistory.length) {
      const avg = dragVelocityHistory.reduce((a, b) => a + b, 0) / dragVelocityHistory.length;
      velocity = Math.max(MAX_VELOCITY, Math.min(MIN_VELOCITY, avg));
    }
  }

  track.addEventListener('mousedown', (e) => { pointerDown(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', (e) => pointerMove(e.clientX));
  window.addEventListener('mouseup', pointerUp);

  track.addEventListener('touchstart', (e) => {
    if (e.touches[0]) pointerDown(e.touches[0].clientX);
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) pointerMove(e.touches[0].clientX);
  }, { passive: true });
  window.addEventListener('touchend', pointerUp);

  // Re-measure when fonts/images load or the viewport resizes.
  window.addEventListener('resize', measure);
  window.addEventListener('load', measure);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);

  measure();
  requestAnimationFrame(frame);

  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.classList.toggle('dark');
    try { localStorage.setItem('arche-theme', isDark ? 'dark' : 'light'); } catch (_) {}
  });
})();
</script>
